function minutesFromDurationText(text) {
  if (!text) return null;
  const h = text.match(/(\d+)\s*시간/);
  const m = text.match(/(\d+)\s*분/);
  if (!h && !m) return null;
  return (h ? parseInt(h[1], 10) * 60 : 0) + (m ? parseInt(m[1], 10) : 0);
}

function distanceKmFromText(text) {
  if (!text) return null;
  const km = text.match(/([\d.,]+)\s*km/);
  if (km) return parseFloat(km[1].replace(",", ""));
  const m = text.match(/([\d.,]+)\s*m\b/);
  if (m) return parseFloat(m[1].replace(",", "")) / 1000;
  return null;
}

// 도쿄 일반택시 표준 요금 기준 추정치 (기본 1.096km 500엔, 이후 255m마다 100엔) — 정체/심야할증 등은 반영 안 된 대략치
function estimateTaxiFareYen(km) {
  if (km == null || km <= 0) return null;
  const BASE_FARE = 500;
  const BASE_KM = 1.096;
  const STEP_KM = 0.255;
  const STEP_FARE = 100;
  if (km <= BASE_KM) return BASE_FARE;
  return BASE_FARE + Math.ceil((km - BASE_KM) / STEP_KM) * STEP_FARE;
}

function tryParseJson(s) {
  try {
    return { ok: true, value: JSON.parse(s) };
  } catch (e) {
    return { ok: false };
  }
}

function repairJsonString(s) {
  let out = s;
  out = out.replace(/,(\s*[\]}])/g, "$1"); // trailing commas
  out = out.replace(/[\u2018\u2019]/g, "'").replace(/[\u201C\u201D]/g, '"'); // smart quotes
  out = out.replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g, ""); // stray control chars
  return out;
}

function extractJson(text) {
  if (!text) throw new Error("빈 응답");
  const cleaned = text.replace(/```json/gi, "").replace(/```/g, "").trim();
  const start = cleaned.indexOf("{");
  const arrStart = cleaned.indexOf("[");
  let s = start;
  if (arrStart !== -1 && (start === -1 || arrStart < start)) s = arrStart;
  const end = Math.max(cleaned.lastIndexOf("}"), cleaned.lastIndexOf("]"));
  const jsonStr = s !== -1 && end !== -1 ? cleaned.slice(s, end + 1) : cleaned;

  let attempt = tryParseJson(jsonStr);
  if (attempt.ok) return attempt.value;

  // 1차 복구 시도 (트레일링 콤마, 스마트 따옴표 등 흔한 실수 교정)
  const repaired = repairJsonString(jsonStr);
  attempt = tryParseJson(repaired);
  if (attempt.ok) return attempt.value;

  // 배열 응답인데 통째로 파싱이 안 되면, 개별 객체 단위로라도 최대한 살려서 반환
  if (jsonStr.trim().startsWith("[")) {
    const objMatches = jsonStr.match(/\{[^{}]*\}/g) || [];
    const salvaged = [];
    for (const m of objMatches) {
      const objAttempt = tryParseJson(repairJsonString(m));
      if (objAttempt.ok) salvaged.push(objAttempt.value);
    }
    if (salvaged.length > 0) return salvaged;
  }

  throw new Error("AI 응답 형식이 깨져서 해석하지 못했어요. 다시 시도해주세요.");
}

async function callGemini(prompt, retriesLeft = 2) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
    {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json", temperature: 0.4 },
      }),
    }
  );
  if (!res.ok) {
    // 503(서버 혼잡)/429(요청 과다)는 일시적인 오류라 잠깐 기다렸다가 자동 재시도
    if ((res.status === 503 || res.status === 429) && retriesLeft > 0) {
      await sleep((3 - retriesLeft) * 1500 + 1000);
      return callGemini(prompt, retriesLeft - 1);
    }
    const errText = await res.text().catch(() => "");
    if (res.status === 503) {
      throw new Error("Gemini 서버가 지금 많이 붐벼요. 잠시 후 다시 시도해주세요.");
    }
    if (res.status === 429) {
      throw new Error("요청이 너무 몰려서 일시적으로 제한됐어요 (유료 키라도 초당/분당 요청 한도는 있어요). 잠시 후 다시 시도해주세요.");
    }
    throw new Error(`Gemini API 오류 (${res.status}): ${errText.slice(0, 200)}`);
  }
  const data = await res.json();
  const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  try {
    return extractJson(text);
  } catch (parseErr) {
    // JSON이 깨진 응답은 재시도하면 다음번엔 정상적으로 나오는 경우가 많음
    if (retriesLeft > 0) {
      await sleep(500);
      return callGemini(prompt, retriesLeft - 1);
    }
    throw parseErr;
  }
}

        <div className="flex flex-col gap-1.5">
          {comments.map((c) => (
            <div key={c.id} className="flex items-start justify-between gap-2 bg-stone-50 rounded-lg px-2.5 py-1.5">
              <p className="text-xs text-stone-600">
                <span className="font-semibold text-stone-800">{c.author}</span> {c.text}
              </p>
              {c.author === myName && (
                <button onClick={() => onRemove(c.id)} className="text-stone-300 hover:text-rose-400 shrink-0">
                  <X size={11} />
                </button>
              )}
            </div>
          ))}
        </div>
      )}
      <div className="flex gap-1.5">
        <input
          value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && submit()}
          placeholder="의견 남기기..."
          className="flex-1 px-2.5 py-1.5 rounded-lg bg-stone-50 border border-stone-100 text-xs outline-none"
        />
        <button onClick={submit} className="px-2.5 py-1.5 rounded-lg bg-stone-100 text-stone-600 text-xs font-medium">
          등록
        </button>
      </div>
    </div>
  );
}

function TokyoTripPlanner() {
  const [unlocked, setUnlocked] = useState(false);
  const [pinInput, setPinInput] = useState("");
  const [pinError, setPinError] = useState(false);

  const [myName, setMyName] = useState(null); // 이 브라우저를 쓰는 가족 구성원 (기기별로 저장)
  const [nameLoaded, setNameLoaded] = useState(false);

  const [dataLoaded, setDataLoaded] = useState(false); // 공유 저장소에서 일정/경비/아카이빙 불러오기 완료 여부
  const [syncError, setSyncError] = useState("");

  const [activeTab, setActiveTab] = useState("schedule");
  const [currentDay, setCurrentDay] = useState(1);
  const [mapsLoaded, setMapsLoaded] = useState(false);
  const [mapsError, setMapsError] = useState(null);

  const [accommodation, setAccommodation] = useState(null); // {name,lat,lng,placeId,address}
  const [accInputValue, setAccInputValue] = useState("");

  const [days, setDays] = useState({
    1: { locations: [], segments: [], memo: "", hubNotes: { start: "", end: "" } },
    2: { locations: [], segments: [], memo: "", hubNotes: { start: "", end: "" } },
    3: { locations: [], segments: [], memo: "", hubNotes: { start: "", end: "" } },
    4: { locations: [], segments: [], memo: "", hubNotes: { start: "", end: "" } },
  });
  const [optimizing, setOptimizing] = useState(false);
  const [optimizeError, setOptimizeError] = useState("");

  const [exchangeRate, setExchangeRate] = useState(900); // KRW per 100 JPY
  const [expenses, setExpenses] = useState([]);
  const [expenseForm, setExpenseForm] = useState({
    title: "", currency: "JPY", amount: "", payer: "아빠", category: "식비", note: "",
  });

  const [archives, setArchives] = useState([]);
  const [addToDayModal, setAddToDayModal] = useState(null); // archive item being added

  /* ---------------- 이 브라우저의 "나" 이름 불러오기 (기기별 개인 저장) ---------------- */
  useEffect(() => {
    if (!unlocked) return;
    (async () => {
      try {
        const result = await storage.get("my-name", false);
        if (result && result.value) setMyName(result.value);
      } catch (e) {
        // 저장된 값 없음 — 최초 접속
      } finally {
        setNameLoaded(true);
      }
    })();
  }, [unlocked]);

  const chooseMyName = async (name) => {
    setMyName(name);
    try {
      await storage.set("my-name", name, false);
    } catch (e) {
      // 저장 실패해도 이번 세션에서는 계속 사용 가능
    }
  };

  /* ---------------- 가족 공유 데이터 불러오기 (일정/경비/아카이빙 — 모두가 같은 걸 봄) ---------------- */
  useEffect(() => {
    if (!unlocked || !myName) return;
    (async () => {
      try {
        const result = await storage.get(TRIP_STORAGE_KEY, true);
        if (result && result.value) {
          const parsed = JSON.parse(result.value);
          if (parsed.accommodation) setAccommodation(parsed.accommodation);
          if (parsed.accommodation?.name) {
            setAccInputValue(parsed.accommodation.name);
            // accInputRef의 input은 Google Autocomplete 위젯 때문에 uncontrolled로 두고 있어서,
            // defaultValue만으로는 비동기로 늦게 로드된 값이 화면에 안 뜨는 버그가 있었음 -> 직접 DOM에 반영
            if (accInputRef.current) accInputRef.current.value = parsed.accommodation.name;
          }
          if (parsed.days) setDays(parsed.days);
          if (typeof parsed.exchangeRate === "number") setExchangeRate(parsed.exchangeRate);
          if (parsed.expenses) setExpenses(parsed.expenses);
          if (parsed.archives) setArchives(parsed.archives);
        }
      } catch (e) {
        // 저장된 데이터 없음 — 이 여행의 첫 저장이 될 예정
      } finally {
        setDataLoaded(true);
      }
    })();
  }, [unlocked, myName]);

  // 일정/경비/아카이빙이 바뀔 때마다 공유 저장소에 자동 저장 (디바운스)
  useEffect(() => {
    if (!unlocked || !myName || !dataLoaded) return;
    const timer = setTimeout(async () => {
      try {
        await storage.set(
          TRIP_STORAGE_KEY,
          JSON.stringify({ accommodation, days, exchangeRate, expenses, archives }),
          true
        );
        setSyncError("");
      } catch (e) {
        if (HAS_CLOUD_SYNC) {
          setSyncError("가족 공유 저장에 실패했어요. 네트워크를 확인해주세요.");
        }
      }
    }, 800);
    return () => clearTimeout(timer);
  }, [unlocked, myName, dataLoaded, accommodation, days, exchangeRate, expenses, archives]);

  /* ---------------- Google Maps 스크립트 로드 (PIN 잠금 해제 후에만) ---------------- */
  useEffect(() => {
    if (!unlocked) return;
    if (window.google && window.google.maps) {
      setMapsLoaded(true);
      return;
    }
    if (!GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY.startsWith("YOUR_")) {
      setMapsError("no-key");
      return;
    }
    const existing = document.getElementById("gmaps-sdk");
    if (existing) {
      existing.addEventListener("load", () => setMapsLoaded(true));
      return;
    }
    const script = document.createElement("script");
    script.id = "gmaps-sdk";
    script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&libraries=places`;
    script.async = true;
    script.defer = true;
    script.onload = () => setMapsLoaded(true);
    script.onerror = () => setMapsError("load-failed");
    document.head.appendChild(script);
  }, [unlocked]);

  /* ---------------- 숙소 검색 Autocomplete ---------------- */
  const accInputRef = useRef(null);
  useEffect(() => {
    if (!mapsLoaded || !accInputRef.current || !window.google) return;
    const ac = new window.google.maps.places.Autocomplete(accInputRef.current, {
      fields: ["geometry", "name", "place_id", "formatted_address"],
      componentRestrictions: { country: "jp" },
      bounds: new window.google.maps.Circle({ center: TOKYO_CENTER, radius: TOKYO_BIAS_RADIUS }).getBounds(),
    });
    const listener = ac.addListener("place_changed", () => {
      const place = ac.getPlace();
      if (!place.geometry) return;
      setAccommodation({
        id: "accommodation",
        name: place.name,
        lat: place.geometry.location.lat(),
        lng: place.geometry.location.lng(),
        placeId: place.place_id,
        address: place.formatted_address,
        type: "hotel",
      });
      setAccInputValue(place.name);
    });
    return () => listener.remove();
  }, [mapsLoaded, myName]);

  /* ---------------- Day별 장소 검색 Autocomplete ---------------- */
  const daySearchRef = useRef(null);
  const [daySearchValue, setDaySearchValue] = useState("");
  useEffect(() => {
    if (!mapsLoaded || !daySearchRef.current || !window.google || activeTab !== "schedule") return;
    const ac = new window.google.maps.places.Autocomplete(daySearchRef.current, {
      fields: ["geometry", "name", "place_id", "formatted_address", "photos", "types"],
      componentRestrictions: { country: "jp" },
      bounds: new window.google.maps.Circle({ center: TOKYO_CENTER, radius: TOKYO_BIAS_RADIUS }).getBounds(),
    });
    const listener = ac.addListener("place_changed", () => {
      const place = ac.getPlace();
      if (!place.geometry) return;
      const loc = {
        id: uid(),
        name: place.name,
        lat: place.geometry.location.lat(),
        lng: place.geometry.location.lng(),
        placeId: place.place_id,
        category: inferCategory(place.types),
        photoUrl: place.photos && place.photos.length > 0 ? place.photos[0].getUrl({ maxWidth: 400, maxHeight: 300 }) : null,
      };
      setDays((prev) => ({
        ...prev,
        [currentDay]: {
          ...prev[currentDay],
          locations: [...prev[currentDay].locations, loc],
          segments: [],
        },
      }));
      setDaySearchValue("");
      if (daySearchRef.current) daySearchRef.current.value = "";
    });
    return () => listener.remove();
  }, [mapsLoaded, activeTab, currentDay]);

  /* ---------------- 경로 구성 ---------------- */
  const computeRoute = useCallback(
    (day, middles) => {
      if (day === 1) {
        return accommodation
          ? [AIRPORT, accommodation, ...middles, accommodation]
          : [AIRPORT, ...middles];
      }
      if (day === 4) {
        return accommodation
          ? [accommodation, ...middles, AIRPORT]
          : [...middles, AIRPORT];
      }
      return accommodation
        ? [accommodation, ...middles, accommodation]
        : [...middles];
    },
    [accommodation]
  );

  const buildRoute = useCallback(
    (day) => computeRoute(day, days[day]?.locations || []),
    [computeRoute, days]
  );

  const removeLocation = (day, id) => {
    setDays((prev) => ({
      ...prev,
      [day]: { ...prev[day], locations: prev[day].locations.filter((l) => l.id !== id), segments: [] },
    }));
  };

  const moveLocation = (day, id, direction) => {
    setDays((prev) => {
      const list = [...prev[day].locations];
      const idx = list.findIndex((l) => l.id === id);
      if (idx === -1) return prev;
      const swapWith = idx + direction;
      if (swapWith < 0 || swapWith >= list.length) return prev;
      [list[idx], list[swapWith]] = [list[swapWith], list[idx]];
      return { ...prev, [day]: { ...prev[day], locations: list, segments: [] } };
    });
  };

  const updateDayMemo = (day, memo) => {
    setDays((prev) => ({ ...prev, [day]: { ...prev[day], memo } }));
  };

  const updateLocationNote = (day, id, note) => {
    setDays((prev) => ({
      ...prev,
      [day]: {
        ...prev[day],
        locations: prev[day].locations.map((l) => (l.id === id ? { ...l, note } : l)),
      },
    }));
  };

  // 공항/숙소(허브)는 locations 배열에 없어서, Day별로 "첫 번째 허브/마지막 허브" 메모를 따로 저장
  const updateHubNote = (day, position, note) => {
    setDays((prev) => ({
      ...prev,
      [day]: {
        ...prev[day],
        hubNotes: { ...(prev[day].hubNotes || {}), [position]: note },
      },
    }));
  };

  /* ---------------- 지도 렌더링 ---------------- */
  const mapDivRef = useRef(null);
  const mapInstanceRef = useRef(null);
  const markersRef = useRef([]);
  const polylineRef = useRef(null);

  useEffect(() => {
    if (!mapsLoaded || activeTab !== "schedule" || !mapDivRef.current || !window.google) return;

    if (!mapInstanceRef.current) {
      mapInstanceRef.current = new window.google.maps.Map(mapDivRef.current, {
        center: { lat: 35.6812, lng: 139.7671 },
        zoom: 11,
        disableDefaultUI: false,
        streetViewControl: false,
        mapTypeControl: false,
        styles: [
          { elementType: "geometry", stylers: [{ color: "#f7f7f5" }] },
          { elementType: "labels.text.fill", stylers: [{ color: "#57534e" }] },
          { featureType: "water", elementType: "geometry", stylers: [{ color: "#e2e2df" }] },
          { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#ececea" }] },
          { featureType: "road", elementType: "geometry", stylers: [{ color: "#ffffff" }] },
        ],
      });
    }
    const map = mapInstanceRef.current;

    markersRef.current.forEach((m) => m.setMap(null));
    markersRef.current = [];
    if (polylineRef.current) polylineRef.current.setMap(null);

    const route = buildRoute(currentDay);
    if (route.length === 0) return;

    const bounds = new window.google.maps.LatLngBounds();
    route.forEach((stop, idx) => {
      const isHub = stop.type === "airport" || stop.type === "hotel";
      const marker = new window.google.maps.Marker({
        position: { lat: stop.lat, lng: stop.lng },
        map,
        label: { text: String(idx + 1), color: "#ffffff", fontSize: "12px", fontWeight: "700" },
        icon: {
          path: window.google.maps.SymbolPath.CIRCLE,
          scale: isHub ? 12 : 10,
          fillColor: isHub ? "#0f172a" : "#4f46e5",
          fillOpacity: 1,
          strokeColor: "#ffffff",
          strokeWeight: 2,
        },
        title: stop.name,
      });
      markersRef.current.push(marker);
      bounds.extend({ lat: stop.lat, lng: stop.lng });
    });

    polylineRef.current = new window.google.maps.Polyline({
      path: route.map((s) => ({ lat: s.lat, lng: s.lng })),
      geodesic: true,
      strokeColor: "#1e1b4b",
      strokeOpacity: 0.7,
      strokeWeight: 4,
    });
    polylineRef.current.setMap(map);

    if (route.length > 1) map.fitBounds(bounds, 60);
    else map.setCenter({ lat: route[0].lat, lng: route[0].lng });

    window.google.maps.event.trigger(map, "resize");
  }, [mapsLoaded, activeTab, currentDay, accommodation, days, buildRoute]);

  /* ---------------- Gemini 경로 최적화 ---------------- */
  const optimizeRoute = async () => {
    const middles = days[currentDay].locations;
    if (middles.length < 2) {
      setOptimizeError("최적화하려면 후보 장소가 2곳 이상 필요해요.");
      return;
    }
    if (!accommodation) {
      setOptimizeError("숙소를 먼저 등록해주세요.");
      return;
    }
    setOptimizing(true);
    setOptimizeError("");
    try {
      const route = buildRoute(currentDay);
      const startPoint = route[0];
      const endPoint = route[route.length - 1];
      const prompt = `당신은 부모님을 동반한 가족여행의 도쿄 동선 최적화 전문가입니다.
${currentDay}일차 여행이며, 아래는 고정된 출발지/도착지와 자유롭게 순서를 정할 수 있는 후보 장소 목록입니다.

고정 출발지: ${startPoint.name} (위도 ${startPoint.lat}, 경도 ${startPoint.lng})
고정 도착지: ${endPoint.name} (위도 ${endPoint.lat}, 경도 ${endPoint.lng})

방문 후보 장소 목록 (id로 구분, 순서는 무관):
${middles.map((m) => `- id: ${m.id}, 이름: ${m.name}, 위도: ${m.lat}, 경도: ${m.lng}`).join("\n")}

요청사항:
1. 부모님 체력 부담을 최소화하고 이동 효율이 좋은 순서로 후보 장소들을 정렬하세요.
2. ★ 이동수단이나 소요시간은 절대 언급하지 마세요 — 앱이 구간마다 실제 이동수단과 시간을 직접 계산해서 정합니다. 당신은 순서만 정하세요.
3. 아래 JSON 형식으로만 응답하세요. 설명 문구, 마크다운, 코드블록 없이 순수 JSON만 반환하세요.

{
  "orderedIds": ["id1", "id2"]
}`;
      const result = await callGemini(prompt);
      const orderedIds = Array.isArray(result.orderedIds) ? result.orderedIds : [];
      const reordered = orderedIds
        .map((id) => middles.find((m) => m.id === id))
        .filter(Boolean);
      const remaining = middles.filter((m) => !orderedIds.includes(m.id));
      const finalOrder = [...reordered, ...remaining];

      // 최종 순서로 실제 경로를 구성하고, 구간마다 규칙(도보 20분 이내→도보, 택시 20분 이내→택시, 그 외→대중교통)에 따라 실제 이동수단·시간을 계산
      const finalRoute = computeRoute(currentDay, finalOrder);
      const legs = [];
      for (let i = 0; i < finalRoute.length - 1; i++) {
        legs.push({ from: finalRoute[i], to: finalRoute[i + 1] });
      }
      const segments = await Promise.all(
        legs.map(async (leg) => {
          const info = await getLegInfo(
            { lat: leg.from.lat, lng: leg.from.lng },
            { lat: leg.to.lat, lng: leg.to.lng }
          );
          return {
            from: leg.from.name,
            to: leg.to.name,
            mode: info ? googleModeLabel(info.mode) : "지하철",
            duration: info ? info.duration : "계산 실패",
            distance: info ? info.distance : null,
            estimated: !info,
          };
        })
      );

      setDays((prev) => ({
        ...prev,
        [currentDay]: {
          ...prev[currentDay],
          locations: finalOrder,
          segments,
        },
      }));
    } catch (err) {
      setOptimizeError(err.message || "AI 경로 최적화 중 오류가 발생했어요.");
    } finally {
      setOptimizing(false);
    }
  };

  /* ---------------- 경비 정산 계산 ---------------- */
  const settlement = useMemo(() => {
    let dadPaidTotal = 0, garyeongPaidTotal = 0;
    let unsettledTotal = 0, garyeongPaidUnsettled = 0;
    expenses.forEach((e) => {
      const krw = toKRW(e.amount, e.currency, exchangeRate);
      if (e.payer === "아빠") dadPaidTotal += krw;
      else garyeongPaidTotal += krw;
      if (!e.settled) {
        unsettledTotal += krw;
        if (e.payer === "가령") garyeongPaidUnsettled += krw;
      }
    });
    const garyeongShare = unsettledTotal * 0.25;
    const diff = garyeongShare - garyeongPaidUnsettled;
    return { dadPaidTotal, garyeongPaidTotal, unsettledTotal, diff };
  }, [expenses, exchangeRate]);

  const addExpense = () => {
    if (!expenseForm.title.trim() || !expenseForm.amount) return;
    setExpenses((prev) => [
      ...prev,
      {
        id: uid(),
        title: expenseForm.title.trim(),
        currency: expenseForm.currency,
        amount: Number(expenseForm.amount),
        payer: expenseForm.payer,
        category: expenseForm.category,
        note: expenseForm.note.trim(),
        settled: false,
      },
    ]);
    setExpenseForm({ title: "", currency: "JPY", amount: "", payer: "아빠", category: "식비", note: "" });
  };

  const updateExpenseNote = (id, note) =>
    setExpenses((prev) => prev.map((e) => (e.id === id ? { ...e, note } : e)));

  const toggleSettled = (id) =>
    setExpenses((prev) => prev.map((e) => (e.id === id ? { ...e, settled: !e.settled } : e)));

  const removeExpense = (id) => setExpenses((prev) => prev.filter((e) => e.id !== id));

  /* ---------------- 아카이빙 ---------------- */
  const archiveSearchRef = useRef(null);
  const [archiveCategory, setArchiveCategory] = useState("관광지");
  useEffect(() => {
    if (!mapsLoaded || !archiveSearchRef.current || !window.google || activeTab !== "archive") return;
    const ac = new window.google.maps.places.Autocomplete(archiveSearchRef.current, {
      fields: ["geometry", "name", "place_id", "formatted_address", "photos", "types"],
      componentRestrictions: { country: "jp" },
      bounds: new window.google.maps.Circle({ center: TOKYO_CENTER, radius: TOKYO_BIAS_RADIUS }).getBounds(),
    });
    const listener = ac.addListener("place_changed", () => {
      const place = ac.getPlace();
      if (!place.geometry) return;
      setArchives((prev) => [
        ...prev,
        {
          id: uid(),
          name: place.name,
          category: inferCategory(place.types),
          lat: place.geometry.location.lat(),
          lng: place.geometry.location.lng(),
          placeId: place.place_id,
          address: place.formatted_address,
          photoUrl: place.photos && place.photos.length > 0 ? place.photos[0].getUrl({ maxWidth: 500, maxHeight: 350 }) : null,
          rating: 0,
          comment: "",
          addedBy: myName,
          comments: [],
          aiInfo: null,
          aiLoading: false,
        },
      ]);
      if (archiveSearchRef.current) archiveSearchRef.current.value = "";
    });
    return () => listener.remove();
  }, [mapsLoaded, activeTab]);

  const updateArchive = (id, patch) =>
    setArchives((prev) => prev.map((a) => (a.id === id ? { ...a, ...patch } : a)));

  const removeArchive = (id) => setArchives((prev) => prev.filter((a) => a.id !== id));

  const addArchiveComment = (id, text) => {
    const trimmed = text.trim();
    if (!trimmed) return;
    setArchives((prev) =>
      prev.map((a) =>
        a.id === id
          ? {
              ...a,
              comments: [
                ...(a.comments || []),
                { id: uid(), author: myName, text: trimmed, at: Date.now() },
              ],
            }
          : a
      )
    );
  };

  const removeArchiveComment = (archiveId, commentId) => {
    setArchives((prev) =>
      prev.map((a) =>
        a.id === archiveId
          ? { ...a, comments: (a.comments || []).filter((c) => c.id !== commentId) }
          : a
      )
    );
  };

  /* ---------------- ✨ AI 맛집/명소 추천 ---------------- */
  const placesServiceRef = useRef(null);
  const distanceServiceRef = useRef(null);
  useEffect(() => {
    if (!mapsLoaded || !window.google) return;
    placesServiceRef.current = new window.google.maps.places.PlacesService(document.createElement("div"));
    distanceServiceRef.current = new window.google.maps.DistanceMatrixService();
  }, [mapsLoaded]);

  const [aiRecommendations, setAiRecommendations] = useState([]);
  const [recommendLoading, setRecommendLoading] = useState(false);
  const [recommendError, setRecommendError] = useState("");
  const [recommendTheme, setRecommendTheme] = useState("");

  // 도쿄 반경으로 위치를 제한해서 실제 장소(좌표/사진/place_id)를 찾아주는 헬퍼
  const resolvePlace = useCallback((query) => {
    return new Promise((resolve) => {
      if (!placesServiceRef.current || !window.google) {
        resolve(null);
        return;
      }
      placesServiceRef.current.findPlaceFromQuery(
        {
          query,
          fields: ["place_id", "name", "geometry", "formatted_address", "photos"],
          locationBias: new window.google.maps.Circle({ center: TOKYO_CENTER, radius: TOKYO_BIAS_RADIUS }),
        },
        (results, status) => {
          if (status === window.google.maps.places.PlacesServiceStatus.OK && results && results[0]) {
            const place = results[0];
            resolve({
              name: place.name,
              lat: place.geometry.location.lat(),
              lng: place.geometry.location.lng(),
              placeId: place.place_id,
              address: place.formatted_address,
              photoUrl:
                place.photos && place.photos.length > 0
                  ? place.photos[0].getUrl({ maxWidth: 500, maxHeight: 350 })
                  : null,
            });
          } else {
            resolve(null);
          }
        }
      );
    });
  }, []);

  // 숙소 ↔ 목적지 사이의 "진짜" 도보 시간/거리를 구글맵으로 직접 계산 (AI 추측 아님)
  const getWalkingInfo = useCallback(
    (destLat, destLng) => {
      return new Promise((resolve) => {
        if (!distanceServiceRef.current || !accommodation || !window.google) {
          resolve(null);
          return;
        }
        distanceServiceRef.current.getDistanceMatrix(
          {
            origins: [{ lat: accommodation.lat, lng: accommodation.lng }],
            destinations: [{ lat: destLat, lng: destLng }],
            travelMode: window.google.maps.TravelMode.WALKING,
          },
          (response, status) => {
            const el = response?.rows?.[0]?.elements?.[0];
            if (status === "OK" && el && el.status === "OK") {
              resolve({
                duration: el.duration.text,
                distance: el.distance.text,
                durationValue: el.duration.value,
              });
            } else {
              resolve(null);
            }
          }
        );
      });
    },
    [accommodation]
  );

  /* ---------------- 아카이빙에 저장된(또는 방금 추가된) 장소마다, 숙소 기준 실제 도보 거리를 자동으로 채워넣기 ---------------- */
  useEffect(() => {
    if (!mapsLoaded || !distanceServiceRef.current || !accommodation) return;
    const pending = archives.filter((a) => a.walking === undefined && a.lat != null && a.lng != null);
    if (pending.length === 0) return;
    let cancelled = false;
    distanceServiceRef.current.getDistanceMatrix(
      {
        origins: [{ lat: accommodation.lat, lng: accommodation.lng }],
        destinations: pending.map((a) => ({ lat: a.lat, lng: a.lng })),
        travelMode: window.google.maps.TravelMode.WALKING,
      },
      (response, status) => {
        if (cancelled) return;
        const elements = status === "OK" ? response?.rows?.[0]?.elements || [] : [];
        setArchives((prev) =>
          prev.map((a) => {
            const idx = pending.findIndex((p) => p.id === a.id);
            if (idx === -1) return a;
            const el = elements[idx];
            if (el && el.status === "OK") {
              return { ...a, walking: { duration: el.duration.text, distance: el.distance.text } };
            }
            return { ...a, walking: null };
          })
        );
      }
    );
    return () => {
      cancelled = true;
    };
  }, [mapsLoaded, accommodation, archives]);

  // 두 지점 사이 실제 이동시간/거리를 지정된 교통수단으로 구글맵에 직접 계산시키는 헬퍼
  // (경로 최적화의 "이동 수단 제안" 구간에도 사용 — AI가 시간을 추측하지 않도록)
  // 한 가지 이동수단으로 구글맵에 실제 거리를 물어보는 저수준 헬퍼 (실패하면 null)
  const queryDistance = useCallback((origin, destination, googleMode) => {
    return new Promise((resolve) => {
      if (!distanceServiceRef.current || !window.google) {
        resolve(null);
        return;
      }
      distanceServiceRef.current.getDistanceMatrix(
        {
          origins: [origin],
          destinations: [destination],
          travelMode: window.google.maps.TravelMode[googleMode],
        },
        (response, status) => {
          const el = response?.rows?.[0]?.elements?.[0];
          if (status === "OK" && el && el.status === "OK") {
            resolve({
              duration: el.duration.text,
              distance: el.distance.text,
              durationSeconds: el.duration.value,
              mode: googleMode,
            });
          } else {
            if (status !== "OK") console.warn("DistanceMatrix 실패:", googleMode, status);
            else if (el) console.warn("DistanceMatrix 경로 없음:", googleMode, el.status);
            resolve(null);
          }
        }
      );
    });
  }, []);

  const TWENTY_MIN = 20 * 60;

  // 규칙: 도보 20분 이내면 도보, 아니면 택시가 20분 이내면 택시, 그것도 넘으면 대중교통
  // (AI가 이동수단을 추측하지 않고, 매번 구글맵 실측 시간으로 규칙에 따라 자동 결정)
  const getLegInfo = useCallback(
    async (origin, destination) => {
      const walk = await queryDistance(origin, destination, "WALKING");
      if (walk && walk.durationSeconds <= TWENTY_MIN) return walk;
      const drive = await queryDistance(origin, destination, "DRIVING");
      if (drive && drive.durationSeconds <= TWENTY_MIN) return drive;
      const transit = await queryDistance(origin, destination, "TRANSIT");
      if (transit) return transit;
      // 대중교통 경로 자체가 없는 곳이면, 그나마 계산됐던 것 중 하나로 대체 (택시 우선)
      return drive || walk || null;
    },
    [queryDistance]
  );

  /* ---------------- AI 최적화를 안 돌려도, 장소를 추가/순서변경만 해도 구간별 실제 이동시간을 자동 계산 ---------------- */
  useEffect(() => {
    if (!mapsLoaded || !distanceServiceRef.current) return;
    const route = computeRoute(currentDay, days[currentDay]?.locations || []);
    if (route.length < 2) return;
    const existingSegments = days[currentDay]?.segments;
    // 예전 방식(무조건 지하철 우선)으로 계산된 결과나, "도보 38분"처럼 새 규칙(20분 룰)에
    // 어긋나는 결과가 저장돼 있으면 무효 처리하고 다시 계산
    const violatesRule = existingSegments?.some((s) => {
      if (s.mode !== "도보" && s.mode !== "택시") return false;
      const min = minutesFromDurationText(s.duration);
      return min != null && min > 20;
    });
    const alreadyOk =
      existingSegments &&
      existingSegments.length === route.length - 1 &&
      !existingSegments.some((s) => s.estimated) &&
      !violatesRule;
    if (alreadyOk) return;
    let cancelled = false;
    (async () => {
      const legs = [];
      for (let i = 0; i < route.length - 1; i++) legs.push({ from: route[i], to: route[i + 1] });
      const segments = await Promise.all(
        legs.map(async (leg) => {
          const info = await getLegInfo(
            { lat: leg.from.lat, lng: leg.from.lng },
            { lat: leg.to.lat, lng: leg.to.lng }
          );
          return {
            from: leg.from.name,
            to: leg.to.name,
            mode: info ? googleModeLabel(info.mode) : "지하철",
            duration: info ? info.duration : "계산 실패",
            distance: info ? info.distance : null,
            estimated: !info,
          };
        })
      );
      if (cancelled) return;
      setDays((prev) => {
        // 계산하는 동안 사용자가 장소를 또 바꿨으면(구간 수가 달라졌으면) 이 결과는 버림
        const latestRoute = computeRoute(currentDay, prev[currentDay]?.locations || []);
        if (latestRoute.length !== route.length) return prev;
        return { ...prev, [currentDay]: { ...prev[currentDay], segments } };
      });
    })();
    return () => {
      cancelled = true;
    };
  }, [mapsLoaded, currentDay, accommodation, days[currentDay]?.locations, computeRoute, getLegInfo]);

  const getAiRecommendations = async () => {
    setRecommendLoading(true);
    setRecommendError("");
    setAiRecommendations([]);
    try {
      const existingNames = archives.map((a) => a.name).join(", ") || "없음";
      const theme = recommendTheme.trim();
      const accLine = accommodation
        ? `숙소 위치: "${accommodation.name}"${accommodation.address ? ` (${accommodation.address})` : ""} — 이 숙소와 같은 동네/역세권, 걸어서 오갈 수 있을 법한 가까운 범위에서 우선 추천하세요. 숙소에서 멀리 떨어진 지역(다른 구, 먼 동네)은 후보에서 제외하세요.`
        : "숙소가 아직 등록되지 않았어요 — 도쿄 안에서 폭넓게 추천하세요.";
      const prompt = `당신은 도쿄 현지 여행 전문가입니다.
반드시 "도쿄(Tokyo)" 안에 실제로 존재하는 곳만 추천하세요. 도쿄가 아닌 다른 도시(오사카, 요코하마, 삿포로 등)는 절대 포함하지 마세요.
${accLine}
큰 분류: "${archiveCategory}"
${theme ? `★ 반드시 지켜야 할 세부 조건: "${theme}" — 이 조건에 딱 맞는 곳만 추천하세요. 특히 도보/이동 시간 조건이 있다면, 위 숙소 위치를 기준으로 그 조건을 만족할 만큼 가까운 곳만 고르세요. 조건과 무관하거나 너무 먼 곳은 절대 포함하지 마세요.` : "특정 세부 조건은 없으니 다양하게 추천해주세요."}
이미 보관함에 있어서 제외해야 할 곳: ${existingNames}

부모님을 동반한 가족 여행객에게 어울리는 곳으로 6곳을 추천해주세요.
★ 중요: "도보 O분", "숙소에서 X분 거리" 같은 구체적인 이동 시간이나 거리는 절대 언급하지 마세요. 당신은 실제 거리를 정확히 계산할 수 없으니, 위치 선정에는 참고하되 답변 문구에는 쓰지 말고, 대신 분위기·메뉴·가족 여행객에게 좋은 이유만 설명하세요.
아래 JSON 배열 형식으로만, 다른 설명 없이 응답하세요.
[
  {"name": "정확한 장소 이름", "area": "위치한 동네/구 (예: 시부야구)", "reason": "이동 시간/거리 언급 없이, 분위기와 가족 여행객에게 좋은 점을 한 줄로"}
]`;
      const result = await callGemini(prompt);
      const list = Array.isArray(result) ? result : [];
      // Gemini가 준 이름들을 도쿄 반경 안에서 실제 장소로 확인 + 사진/좌표 확보 (엉뚱한 지역 결과 방지)
      // + 숙소 기준 진짜 도보 시간은 구글맵 Distance Matrix로 직접 계산
      const resolved = await Promise.all(
        list.map(async (rec) => {
          const place = await resolvePlace(`도쿄 ${rec.area || ""} ${rec.name}`);
          const walking = place ? await getWalkingInfo(place.lat, place.lng) : null;
          return { ...rec, ...(place || {}), resolved: !!place, walking };
        })
      );
      // 숙소에서 가까운 순서로 정렬 (실측 도보 시간 기준) — Gemini가 놓친 먼 곳이 있어도 가까운 게 먼저 보이도록
      resolved.sort((a, b) => {
        const da = a.walking ? a.walking.durationValue : Infinity;
        const db = b.walking ? b.walking.durationValue : Infinity;
        return da - db;
      });
      setAiRecommendations(resolved);
    } catch (err) {
      setRecommendError(err.message || "추천을 가져오지 못했어요.");
    } finally {
      setRecommendLoading(false);
    }
  };

  const addRecommendationToArchive = (rec) => {
    if (!rec.resolved || !rec.placeId) {
      alert(`"${rec.name}"을(를) 구글맵에서 정확히 찾지 못했어요. 검색창에서 직접 검색해서 추가해주세요.`);
      return;
    }
    setArchives((prev) => [
      ...prev,
      {
        id: uid(),
        name: rec.name,
        category: archiveCategory,
        lat: rec.lat,
        lng: rec.lng,
        placeId: rec.placeId,
        address: rec.address,
        photoUrl: rec.photoUrl || null,
        rating: 0,
        comment: rec.reason || "",
        addedBy: myName,
        comments: [],
        aiInfo: null,
        aiLoading: false,
        walking: rec.walking || null,
      },
    ]);
    setAiRecommendations((prev) => prev.filter((r) => r.name !== rec.name));
  };

  const fillAiInfo = async (item) => {
    updateArchive(item.id, { aiLoading: true });
    try {
      const prompt = `장소명 "${item.name}" (도쿄 소재, 분류: ${item.category})에 대한 여행 정보를 알려주세요.
아래 JSON 형식으로만, 다른 설명 없이 응답하세요.
{
  "menu": "대표 추천 메뉴 또는 볼거리/체험 2~4개 (콤마로 구분)",
  "budget": "1인당 대략적인 예산 (엔화 범위, 예: 1500~2500엔)",
  "waitingTip": "웨이팅 관련 팁 (없으면 '특별한 웨이팅 없음')",
  "reservation": "예약 필수 여부와 관련 팁 (예: 필수 / 권장 / 불필요)"
}`;
      const info = await callGemini(prompt);
      updateArchive(item.id, { aiInfo: info, aiLoading: false });
    } catch (err) {
      updateArchive(item.id, { aiLoading: false });
      alert("AI 정보 채우기 실패: " + (err.message || "알 수 없는 오류"));
    }
  };

  const addArchiveToDay = (item, day) => {
    setDays((prev) => ({
      ...prev,
      [day]: {
        ...prev[day],
        locations: [
          ...prev[day].locations,
          {
            id: uid(),
            name: item.name,
            lat: item.lat,
            lng: item.lng,
            placeId: item.placeId,
            category: item.category,
            photoUrl: item.photoUrl || null,
          },
        ],
        segments: [],
      },
    }));
    setAddToDayModal(null);
    setActiveTab("schedule");
    setCurrentDay(day);
  };

  /* ---------------- 탭 정의 ---------------- */
  const tabs = [
    { id: "schedule", label: "일정 & 지도", icon: MapPin },
    { id: "expense", label: "경비 정산", icon: Wallet },
    { id: "archive", label: "아카이빙", icon: Bookmark },
  ];

  const currentRoute = buildRoute(currentDay);

  const handlePinSubmit = (e) => {
    e.preventDefault();
    if (pinInput === APP_PIN) {
      setUnlocked(true);
      setPinError(false);
    } else {
      setPinError(true);
      setPinInput("");
    }
  };

  if (!unlocked) {
    return (
      <div className="app-bg min-h-screen w-full flex items-center justify-center p-4 relative">
        <GlassCard className="p-8 w-full max-w-xs flex flex-col items-center gap-4 text-center relative">
          <div className="w-14 h-14 rounded-2xl bg-slate-900/90 flex items-center justify-center shadow-md shadow-stone-200">
            <Plane className="text-white" size={26} />
          </div>
          <div>
            <p className="text-lg font-bold tracking-tight text-stone-800">도쿄 가족여행 플래너</p>
            <p className="text-xs text-stone-600 mt-1">PIN 번호를 입력해주세요</p>
          </div>
          <form onSubmit={handlePinSubmit} className="w-full flex flex-col gap-3">
            <input
              type="password"
              inputMode="numeric"
              autoFocus
              value={pinInput}
              onChange={(e) => { setPinInput(e.target.value); setPinError(false); }}
              className={`w-full text-center tracking-[0.5em] text-lg px-4 py-3 rounded-2xl bg-stone-50/70 border outline-none ${
                pinError ? "border-rose-300 focus:ring-2 focus:ring-rose-200" : "border-stone-100 focus:ring-2 focus:ring-stone-300"
              }`}
              placeholder="••••"
            />
            {pinError && (
              <p className="text-xs text-rose-500 flex items-center justify-center gap-1">
                <AlertCircle size={12} /> PIN이 일치하지 않아요
              </p>
            )}
            <button
              type="submit"
              className="w-full px-4 py-3 rounded-2xl bg-slate-900 text-white font-semibold text-sm shadow-md shadow-stone-200"
            >
              입장하기
            </button>
          </form>
        </GlassCard>
      </div>
    );
  }

  if (!nameLoaded) {
    return (
      <div className="app-bg min-h-screen w-full flex items-center justify-center">
        <Loader2 size={24} className="animate-spin text-white" />
      </div>
    );
  }

  if (!myName) {
    return (
      <div className="app-bg min-h-screen w-full flex items-center justify-center p-4 relative">
        <GlassCard className="p-8 w-full max-w-xs flex flex-col items-center gap-4 text-center relative">
          <div className="w-14 h-14 rounded-2xl bg-slate-900/90 flex items-center justify-center shadow-md shadow-stone-200">
            <Users className="text-white" size={24} />
          </div>
          <div>
            <p className="text-lg font-bold tracking-tight text-stone-800">누구세요?</p>
            <p className="text-xs text-stone-600 mt-1">이 기기에서 계속 이 이름으로 표시돼요 (나중에 바꿀 수 있어요)</p>
          </div>
          <div className="w-full grid grid-cols-2 gap-2">
            {FAMILY_MEMBERS.map((name) => (
              <button
                key={name}
                onClick={() => chooseMyName(name)}
                className="px-4 py-3 rounded-2xl bg-stone-100 text-stone-700 font-medium text-sm hover:bg-slate-900 hover:text-white transition-colors"
              >
                {name}
              </button>
            ))}
          </div>
        </GlassCard>
      </div>
    );
  }

  return (
    <div className="app-bg min-h-screen w-full text-stone-700 relative">
      <div className="flex flex-col md:flex-row min-h-screen relative">
        {/* ---------- PC 사이드바 ---------- */}
        <aside className="hidden md:flex md:flex-col w-64 shrink-0 p-6 gap-6 sticky top-0 h-screen bg-white/85 backdrop-blur-xl border-r border-white/60 relative z-10">
          <div className="flex items-center gap-2 px-2">
            <div className="w-10 h-10 rounded-2xl bg-slate-900/90 flex items-center justify-center shadow-md shadow-stone-200">
              <Plane className="text-white" size={20} />
            </div>
            <div>
              <p className="font-bold tracking-tight text-stone-800 leading-tight">도쿄 가족여행</p>
              <p className="text-xs text-stone-600">3박 4일 플래너</p>
            </div>
          </div>
          <nav className="flex flex-col gap-2">
            {tabs.map((t) => {
              const Icon = t.icon;
              const active = activeTab === t.id;
              return (
                <button
                  key={t.id}
                  onClick={() => setActiveTab(t.id)}
                  className={`flex items-center gap-3 px-4 py-3 rounded-2xl text-sm font-medium transition-all ${
                    active
                      ? "bg-slate-900 text-white shadow-md shadow-stone-200"
                      : "text-stone-700 hover:bg-stone-100"
                  }`}
                >
                  <Icon size={18} />
                  {t.label}
                </button>
              );
            })}
          </nav>
          <GlassCard className="p-3 flex items-center justify-between gap-2 text-xs">
            <span className="text-stone-600">
              나: <span className="font-semibold text-stone-800">{myName}</span>
            </span>
            <button onClick={() => setMyName(null)} className="text-stone-600 hover:text-stone-700 underline">
              변경
            </button>
          </GlassCard>
          <p className="text-[11px] text-stone-600 px-1 -mt-1">
            {HAS_CLOUD_SYNC ? "🟢 가족과 실시간 공유 중" : "⚪ 이 기기에만 저장됨 (공유 안 됨)"}
          </p>
          {syncError && (
            <p className="text-[11px] text-rose-500 flex items-center gap-1 px-1">
              <AlertCircle size={11} /> {syncError}

                Gemini가 도쿄 안에서만, 위 조건에 맞는 곳만 골라 추천해줘요. 이미 보관함에 있는 곳은 자동으로 제외돼요.
              </p>
              {recommendError && (
                <p className="text-xs text-rose-500 flex items-center gap-1">
                  <AlertCircle size={12} /> {recommendError}
                </p>
              )}
              {aiRecommendations.length > 0 && (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  {aiRecommendations.map((rec, i) => (
                    <div key={i} className="flex flex-col gap-1.5 bg-stone-50 rounded-2xl overflow-hidden">
                      {rec.photoUrl ? (
                        <img src={rec.photoUrl} alt={rec.name} className="w-full h-32 object-cover" />
                      ) : (
                        <div className="w-full h-20 bg-stone-100 flex items-center justify-center text-stone-300">
                          {archiveCategory === "맛집" ? <Utensils size={20} /> : <Camera size={20} />}
                        </div>
                      )}
                      <div className="flex flex-col gap-1.5 px-4 pb-3 pt-1">
                        {rec.placeId ? (
                          <a
                            href={placeMapUrl(rec)}
                            target="_blank"
                            rel="noreferrer"
                            className="font-semibold text-stone-700 text-sm hover:text-stone-800 hover:underline"
                          >
                            {rec.name}
                          </a>
                        ) : (
                          <p className="font-semibold text-stone-700 text-sm">{rec.name}</p>
                        )}
                        <p className="text-[11px] text-stone-600">{rec.area}</p>
                        {rec.walking ? (
                          <span className="self-start flex items-center gap-1 text-[11px] font-medium text-stone-700 bg-stone-100/80 rounded-full px-2 py-0.5">
                            <Clock size={11} /> 숙소에서 실제 도보 {rec.walking.duration} ({rec.walking.distance})
                          </span>
                        ) : rec.resolved && !accommodation ? (
                          <span className="text-[11px] text-stone-600">숙소를 등록하면 실제 도보 시간이 표시돼요</span>
                        ) : null}
                        <p className="text-xs text-stone-600 leading-relaxed">{rec.reason}</p>
                        {!rec.resolved && (
                          <p className="text-[11px] text-rose-400 flex items-center gap-1">
                            <AlertCircle size={11} /> 구글맵에서 정확히 못 찾았어요
                          </p>
                        )}
                        <button
                          onClick={() => addRecommendationToArchive(rec)}
                          disabled={!rec.resolved}
                          className="self-start mt-1 flex items-center gap-1 px-3 py-1.5 rounded-xl bg-slate-900 text-white text-xs font-medium disabled:opacity-40"
                        >
                          <Plus size={12} /> 보관함에 추가
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </GlassCard>

            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              {archives.length === 0 && (
                <p className="text-sm text-stone-600 col-span-full text-center py-6">
                  보관함이 비어있어요. 위 검색창에서 장소를 추가해보세요.
                </p>
              )}
              {archives.map((a) => (
                <GlassCard key={a.id} className="overflow-hidden flex flex-col gap-0 p-0">
                  {a.photoUrl ? (
                    <img src={a.photoUrl} alt={a.name} className="w-full h-36 object-cover" />
                  ) : (
                    <div className="w-full h-20 bg-stone-50/80 flex items-center justify-center text-stone-200">
                      {a.category === "맛집" ? <Utensils size={22} /> : <Camera size={22} />}
                    </div>
                  )}
                  <div className="flex flex-col gap-3 p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="min-w-0">
                      <span
                        className={`inline-flex items-center gap-1 text-[10px] font-medium px-2 py-0.5 rounded-full mb-1 ${
                          a.category === "맛집" ? "bg-stone-100 text-stone-700" : "bg-stone-100 text-stone-700"
                        }`}
                      >
                        {a.category === "맛집" ? <Utensils size={10} /> : <Camera size={10} />}
                        {a.category}
                      </span>
                      <a
                        href={placeMapUrl(a)}
                        target="_blank"
                        rel="noreferrer"
                        className="block font-semibold text-stone-700 truncate hover:text-stone-800 hover:underline"
                      >
                        {a.name}
                      </a>
                      <p className="text-xs text-stone-600 truncate">{a.address}</p>
                      {a.addedBy && (
                        <span className="inline-block mt-1 text-[10px] text-stone-600">
                          {a.addedBy}이(가) 추가함
                        </span>
                      )}
                    </div>
                    <button onClick={() => removeArchive(a.id)} className="text-stone-300 hover:text-rose-400 shrink-0">
                      <Trash2 size={14} />
                    </button>
                  </div>

                  <Stars value={a.rating} onChange={(n) => updateArchive(a.id, { rating: n })} />

                  {a.walking ? (
                    <span className="self-start flex items-center gap-1 text-[11px] font-medium text-stone-700 bg-stone-100/80 rounded-full px-2 py-0.5">
                      <Clock size={11} /> 숙소에서 실제 도보 {a.walking.duration} ({a.walking.distance})
                    </span>
                  ) : accommodation && a.walking !== null ? (
                    <span className="text-[11px] text-stone-600">거리 계산 중...</span>
                  ) : null}

                  {a.comment && <p className="text-xs text-stone-600 leading-relaxed">{a.comment}</p>}

                  <ArchiveComments
                    comments={a.comments}
                    myName={myName}
                    onAdd={(text) => addArchiveComment(a.id, text)}
                    onRemove={(commentId) => removeArchiveComment(a.id, commentId)}
                  />

                  {a.aiInfo ? (
                    <div className="bg-sky-50/70 rounded-xl px-3 py-2 flex flex-col gap-1 text-xs text-stone-600">
                      <p><span className="font-semibold">추천:</span> {a.aiInfo.menu}</p>
                      <p><span className="font-semibold">예산:</span> {a.aiInfo.budget}</p>
                      <p><span className="font-semibold">웨이팅:</span> {a.aiInfo.waitingTip}</p>
                      <p><span className="font-semibold">예약:</span> {a.aiInfo.reservation}</p>
                    </div>
                  ) : (
                    <button
                      onClick={() => fillAiInfo(a)}
                      disabled={a.aiLoading}
                      className="flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl bg-sky-50 text-sky-700 text-xs font-medium disabled:opacity-60"
                    >
                      {a.aiLoading ? <Loader2 size={12} className="animate-spin" /> : <Sparkles size={12} />}
                      AI 정보 채우기
                    </button>
                  )}

                  <div className="flex gap-2">
                    <a
                      href={directionsUrl(a.lat, a.lng)}
                      target="_blank"
                      rel="noreferrer"
                      className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl bg-stone-100/80 text-stone-700 text-xs font-medium"
                    >
                      <Navigation size={12} /> 길찾기
                    </a>
                    <button
                      onClick={() => setAddToDayModal(a)}
                      className="flex-1 flex items-center justify-center gap-1.5 px-3 py-2 rounded-xl bg-stone-100 text-stone-600 text-xs font-medium"
                    >
                      <Plus size={12} /> 일정에 추가
                    </button>
                  </div>
                  </div>
                </GlassCard>
              ))}
            </div>
          </div>
        </main>
      </div>

      {/* ---------- 모바일 하단 탭 바 ---------- */}
      <nav className="md:hidden fixed bottom-0 left-0 right-0 z-30 bg-white/80 backdrop-blur-xl border-t border-white/60 flex justify-around py-2">
        {tabs.map((t) => {
          const Icon = t.icon;
          const active = activeTab === t.id;
          return (
            <button
              key={t.id}
              onClick={() => setActiveTab(t.id)}
              className={`flex flex-col items-center gap-0.5 px-4 py-1.5 rounded-2xl text-[11px] font-medium ${
                active ? "text-stone-800" : "text-stone-600"
              }`}
            >
              <Icon size={18} />
              {t.label}
            </button>
          );
        })}
      </nav>

      {/* ---------- 일정에 추가 모달 ---------- */}
      {addToDayModal && (
        <div className="fixed inset-0 z-40 bg-slate-900/30 backdrop-blur-sm flex items-center justify-center p-4">
          <GlassCard className="p-6 w-full max-w-sm flex flex-col gap-4">
            <div className="flex items-center justify-between">
              <p className="font-semibold text-stone-700">
                "{addToDayModal.name}" 어느 날에 추가할까요?
              </p>
              <button onClick={() => setAddToDayModal(null)} className="text-stone-600">
                <X size={18} />
              </button>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {[1, 2, 3, 4].map((d) => (
                <button
                  key={d}
                  onClick={() => addArchiveToDay(addToDayModal, d)}
                  className="px-4 py-3 rounded-2xl bg-stone-50 text-stone-700 font-medium text-sm hover:bg-stone-100"
                >
                  {DAY_META[d].label}
                </button>
              ))}
            </div>
          </GlassCard>
        </div>
      )}
    </div>
  );
}


const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<TokyoTripPlanner />);

</script>
</body>
</html>
